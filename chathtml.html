  body {
    margin: 0;
    font-family: "Segoe UI", Arial;

  /* FLOAT BUTTON */
  .chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: #075e54;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    z-index: 9999;
  }

  /* CHAT PANEL */
  .chat-panel {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 380px;
    height: 520px;
    background: #efeae2;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
  }

  /* HEADER */
  .header {
    background: #075e54;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
  }

  .avatar {
    width: 30px;
    height: 30px;
    background: white;
    border-radius: 50%;
  }

  .close {
    cursor: pointer;
    font-size: 18px;
  }

  /* CHAT AREA */
  .messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg {
    max-width: 75%;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 14px;
    word-wrap: break-word;
  }

  .user {
    align-self: flex-end;
    background: #dcf8c6;
    border-bottom-right-radius: 0;
  }

  .bot {
    align-self: flex-start;
    background: white;
    border-bottom-left-radius: 0;
  }

  .time {
    font-size: 10px;
    color: gray;
    margin-top: 4px;
    text-align: right;
  }

  /* INPUT */
  .input-area {
    display: flex;
    padding: 8px;
    background: #f0f0f0;
    gap: 8px;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
  }

  button.send {
    background: #075e54;
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
  }

  /* MOBILE */

<body>
<!-- FLOAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">💬</div>
<!-- CHAT PANEL -->
<div class="chat-panel" id="chatPanel">
<div class="header">
<div class="header-title">
<div class="avatar"></div>
      n8n AI Assistant
    </div>
<div class="close" onclick="toggleChat()">✖</div>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
<input id="input" placeholder="Type a message..." type="text"/>
<button class="send" onclick="sendMessage()">➤</button>
</div>
</div>
<script>
  const webhookUrl = "https://workflows-n8nrunnerpostgresollama-cc30a1-187-127-191-113.sslip.io/webhook/leads";

  function toggleChat() {
    const panel = document.getElementById("chatPanel");
    panel.style.display = panel.style.display === "flex" ? "none" : "flex";
  }

  function timeNow() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function addMessage(text, type) {
    const messages = document.getElementById("messages");

    const div = document.createElement("div");
    div.classList.add("msg", type);

    div.innerHTML = `
      ${text}
      <div class="time">${timeNow()}</div>
    `;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
      const res = await fetch(webhookUrl, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      const reply = data.output || data.message || "No response";
      addMessage(reply, "bot");

    } catch (err) {
      addMessage("Error connecting to server", "bot");
      console.error(err);
    }
  }

  document.getElementById("input").addEventListener("keydown", function(e){
    if (e.key === "Enter") sendMessage();
  });
</script>
